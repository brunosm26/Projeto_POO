spring.application.name=tickets

# Banco H2 em memória (dados somem ao reiniciar, ótimo para testes)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Corrigido: cria/atualiza as tabelas automaticamente com base nas entidades
spring.jpa.hibernate.ddl-auto=update

# Mostra as queries SQL no console (útil para debug)
spring.jpa.show-sql=true
